# NASA Earthdata Login bearer token for GES DISC. Create one at
# https://urs.earthdata.nasa.gov (Generate Token) and put it in .env as
# earthdata_token=<token>. Kept out of git; placeholder here.
earthdata_token = "<ADD-EARTHDATA_TOKEN>"

# GES DISC OCO2_L2_Lite_FP base path (version suffix appended per year). 11.3r
# only reprocessed the most recent years, so earlier years use 11.2r.
data_base_url = "https://oco2.gesdisc.eosdis.nasa.gov/data/OCO2_DATA/OCO2_L2_Lite_FP"
base_version = "11.2r"
recent_version = "11.3r"
recent_start_year = 2024

raw_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/raw/gesdisc/OCO2_L2_Lite_FP/xco2"
output_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/datasets/gesdisc/OCO2_L2_Lite_FP/xco2"

overwrite_download = false
overwrite_processing = false


year_list = "2015,2016,2017,2018,2019,2020,2021"

# interpolation method for processing step
interp_method = "linear"

run_a = true
run_b = true
run_c = true
run_d = true
run_e = true
run_f = true
run_g = true


[run]
max_workers = 6
log_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/raw/gesdisc/OCO2_L2_Lite_FP.11.1r/logs"


[repo]
url = "https://github.com/aiddata/geo-datasets.git"
branch = "master"
directory = "datasets/oco2"


[deploy]
deployment_name = "oco2"
image_tag = "083d531"
version = 3
flow_file_name = "main"
flow_name = "oco2"
work_pool = "geodata"
