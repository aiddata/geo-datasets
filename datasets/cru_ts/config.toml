# define range of years to download, process
start_year = 1901
end_year = 2022

# this should match the dir names used for raw data and to be used for processed data
cru_version = "4.07"
cru_url_dir = "cruts.2304141047.v4.07"

# output directories
raw_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/raw/cru_ts"
output_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/datasets/cru_ts"

overwrite_download = false
overwrite_unzip = false
overwrite_processing = true


[run]
max_workers = 6
log_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/raw/cru_ts/logs"


[repo]
url = "https://github.com/aiddata/geo-datasets.git"
branch = "master"
directory = "datasets/cru_ts"


[deploy]
deployment_name = "cru_ts"
image_tag = "083d531"
version = 4
flow_file_name = "main"
flow_name = "cru_ts"
work_pool = "geodata"
