# create an Earth Data token at the LAADS DAAC site
# https://ladsweb.modaps.eosdis.nasa.gov/
# once logged in, click on "Login" and click "Generate Token"
# tokens last for ~2 months
# add the token to the .env file in this directory using the following format:
# EARTHDATA_TOKEN=<your-token-here>

# Name of dataset
name = "GPWv4"

# Paths of input and output directories
raw_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/raw/gpw/gpw_v4_rev11"
output_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/datasets/gpw/gpw_v4_rev11"

# Years to process
years = "2000,2005,2010,2015,2020"


# Overwrite existing files?
overwrite_download = false
overwrite_extract = false
overwrite_processing = false


[run]
max_workers = 10
log_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/raw/gpw/logs"

[repo]
url = "https://github.com/aiddata/geo-datasets.git"
branch = "master"
directory = "datasets/gpw"


[deploy]
deployment_name = "GPWv4"
image_tag = "083d531"
version = 3
flow_file_name = "main"
flow_name = "gpwv4"
work_pool = "geodata"
