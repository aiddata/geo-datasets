# create an Earthdata token at the LAADS DAAC site
# https://ladsweb.modaps.eosdis.nasa.gov/ (Login -> Generate Token), then add
# it to the gitignored .env in this directory as:
#   earthdata_token=<your-token-here>
# The placeholder below is overlaid from .env at deploy time; keep it here so
# the config validates.
earthdata_token = "<ADD-EARTHDATA_TOKEN>"

# number corresponding to data folder
# ...nasa.gov/api/v2/content/archives/allData/XXX
data_num = 466

# years = [ 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022 ]

years = "2000,2022"

# output directories
raw_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/raw/ltdr_ndvi"
output_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/datasets/ltdr_ndvi"

overwrite_download = false
validate_download = true
overwrite_processing = true


[run]
backend = "local"
max_workers = 4
log_dir = "/sciclone/nova/REU/geo/geoquery/staging/data/raw/ltdr_ndvi/logs"


[repo]
url = "https://github.com/aiddata/geo-datasets.git"
branch = "master"
directory = "datasets/ltdr_ndvi"


[deploy]
deployment_name = "ltdr_ndvi"
version = 3
image_tag = "083d531"
flow_file_name = "main"
flow_name = "ltdr_ndvi"
work_pool = "geodata"
